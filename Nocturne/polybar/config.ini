[colors]

[bar/example]
;monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 30
radius = 0.0
fixed-center = true 

border-left-size = 0
border-bottom-size = 5
border-right-size = 0

padding-left = 2
padding-right = 2

border-size = 0pt

module-margin-left = 1
module-margin-right = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = powermenu separator date separator i3
modules-right = battery separator temperature separator pulseaudio separator memory separator cpu separator wlan


[module/cava]
type = custom/script
tail = true
exec = $HOME/.config/polybar/polybar-cava/cava.sh
format = <label>
format-font = 5
label = %output%
label-foreground = ${colors.green}

[module/separator]
type = custom/text
content = |
content-foreground = ${colors.gray}

[module/shutdown]
type = custom/text
content = ÔĆÉ
content-foreground = ${colors.orange}
click-left = notify-send "poweroff"


[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "ÓČĮ "

label-layout = %layout%
label-layout-underline = ${colors.blue}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.background}
label-indicator-underline = ${colors.purple}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#0a81f5}%mountpoint%%{F-}: %percentage_used%%
label-unmounted = %mountpoint% not mounted

[module/bspwm]
type = internal/bspwm

label-focused = %index%
label-focused-padding = 2

label-occupied = %index%
label-occupied-padding = 2

label-urgent = %index%!
label-urgent-padding = 2

label-empty = %index%
label-empty-padding = 2

; Separator in between workspaces
label-separator = |

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode-padding = 2

; focused = Active workspace on focused monitor
label-focused = ÔÉą
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = ÔāĖ
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
; %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = ÔÉą
label-urgent-padding = 2

; Separator in between workspaces
; label-separator = |
; label-separator-foreground = ${colors.gray}


[module/mpd]
type = internal/mpd
format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = ÓāĖ
icon-stop = Óāô
icon-play = Óāö
icon-pause = Óāõ
icon-next = Óāú

label-song-maxlen = 25
label-song-ellipsis = true

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label = BL

bar-width = 10
bar-indicator = |
bar-indicator-font = 2
bar-fill = ‚ĒÄ
bar-fill-font = 2
bar-empty = ‚ĒÄ
bar-empty-font = 2

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ôź£  "
label = %percentage_used%%

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0

format-connected = <ramp-signal> NET
label-connected = %essid%

format-disconnected = "Ô™©"
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected

ramp-signal-0 = "Ô™® "
ramp-signal-1 = "Ô™® "
ramp-signal-2 = "Ô™® "
ramp-signal-3 = "Ô™® "
ramp-signal-4 = "Ô™® "

[module/eth]
type = internal/network
interface = eno1
interval = 3.0

format-connected-underline = 55aa55
format-connected-prefix = "ÓÜú "
label-connected = %local_ip%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground

[module/date]
type = internal/date
interval = 1

date = " %Y-%m-%d"
date-alt = " %Y-%m-%d"

time = %H:%M:%S
time-alt = %H:%M:%S

format-prefix = "ÔĀ≥  ÔÄó "
format-prefix-foreground = ${colors.orange}

label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = ÔíÖ  %percentage%%

label-muted = ÔĎ¶  0%

bar-volume-width = 10
bar-volume-gradient = false
bar-volume-indicator-font = 2
bar-volume-fill = ‚ĒÄ
bar-volume-fill-font = 2
bar-volume-empty = ‚ĒÄ
bar-volume-empty-font = 2

[module/alsa]
type = internal/alsa

format-volume = <label-volume> <bar-volume>
label-volume = VOL

format-muted-prefix = "Óąā "
label-muted = sound muted

bar-volume-width = 10
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ‚ĒÄ
bar-volume-fill-font = 2
bar-volume-empty = ‚ĒÄ
bar-volume-empty-font = 2

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>

format-discharging = <animation-discharging> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}

format-full-prefix = "ÔČÄ  "
format-full-prefix-foreground = ${colors.purple}
format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = "ÔČĄ  "
ramp-capacity-1 = "ÔČā  "
ramp-capacity-2 = "ÔČÄ  "

animation-charging-0 = "ÔČĄ  "
animation-charging-1 = "ÔČā  "
animation-charging-2 = "ÔČÄ  "
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

animation-discharging-0 = "ÔČÄ  "
animation-discharging-1 = "ÔČā  "
animation-discharging-2 = "ÔČĄ  "
animation-discharging-foreground = ${colors.yellow}
animation-discharging-framerate = 750

[module/temperature]
type = internal/temperature
thermal-zone = 1
warn-temperature = 60
interval = 0.5

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.green}

ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = Ôčá
ramp-foreground = ${colors.green}

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = ÔĆÉ 
label-open-foreground = ${colors.blue}
label-close = Ôįł cancel
label-close-foreground = ${colors.orange}
label-separator = |
label-separator-foreground = ${colors.foreground}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[settings]
screenchange-reload = false 
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
